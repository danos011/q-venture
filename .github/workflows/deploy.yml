name: Deploy q-venture

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Гейт: убеждаемся, что проект собирается, прежде чем катить в прод
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm run build

  deploy:
    needs: build-check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            # PORT задаём явно: --update-env иначе сбросил бы его и next
            # занял бы дефолтный 3000 (порт соседнего сайта lanskaya-gavan)
            export PORT=3001
            cd /var/www/q-venture
            git fetch origin main
            git reset --hard origin/main
            npm ci --no-audit --no-fund
            npm run build
            pm2 restart q-venture --update-env || pm2 start npm --name q-venture -- start
            pm2 save
